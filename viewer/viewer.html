<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Visualizador em Tempo Real</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #canvas-container { width: 80%; max-width: 500px; border: 4px solid #333; border-radius: 20px; overflow: hidden; background: #000; position: relative; }
        img { width: 100%; display: block; min-height: 300px; }
        .status { position: absolute; top: 10px; left: 10px; background: rgba(255,0,0,0.8); padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>StablePack Stream</h1>
    <div id="canvas-container">
        <div id="live-badge" class="status" style="display: none;">● AO VIVO</div>
        <img id="stream-img" src="" alt="A aguardar transmissão...">
    </div>
    <p id="info">Estado: Desconectado</p>

    <script>
        const img = document.getElementById('stream-img');
        const info = document.getElementById('info');
        const badge = document.getElementById('live-badge');

        // SUBSTITUI PELO TEU IP REAL
        const WS_URL = 'ws://10.222.248.231:8000/ws/viewer';
        
        let socket;

        function connect() {
            socket = new WebSocket(WS_URL);

            socket.onopen = () => {
                info.innerText = "Estado: Conectado ao Servidor";
                info.style.color = "#4ade80";
            };

            socket.onmessage = (event) => {
                // A imagem chega como string Base64 completa
                img.src = event.data;
                badge.style.display = "block";
            };

            socket.onclose = () => {
                info.innerText = "Estado: Conexão Perdida. A tentar reconectar...";
                info.style.color = "#f87171";
                badge.style.display = "none";
                setTimeout(connect, 2000); // Tenta reconectar a cada 2 seg
            };

            socket.onerror = (err) => {
                console.error("Erro no WebSocket:", err);
            };
        }

        connect();
    </script>
</body>
</html>
