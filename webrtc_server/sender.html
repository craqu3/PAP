<!DOCTYPE html>
<html>
<body>
    <h2>Emissor WebRTC</h2>
    <video id="preview" autoplay playsinline style="width:300px;"></video>

    <script>
        const ws = new WebSocket("ws://127.0.0.1:9000");
        const pc = new RTCPeerConnection();

        let streamReady = false;

        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {
                console.log("STREAM OBTIDA");
                document.getElementById("preview").srcObject = stream;
                stream.getTracks().forEach(track => pc.addTrack(track, stream));
                streamReady = true;
            });

        pc.onicecandidate = event => {
            if (event.candidate) {
                ws.send(JSON.stringify({
                    role: "sender",
                    type: "candidate",
                    candidate: event.candidate
                }));
            }
        };

        ws.onopen = async () => {
            console.log("WS SENDER ABRIU");

            // 🔥 Esperar até o stream estar pronto
            while (!streamReady) {
                console.log("À espera do stream...");
                await new Promise(r => setTimeout(r, 50));
            }

            console.log("STREAM PRONTO → Criar OFFER");

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            ws.send(JSON.stringify({
                role: "sender",
                type: "offer",
                sdp: offer.sdp
            }));
        };

        ws.onmessage = async (msg) => {
            console.log("SENDER ← MSG:", msg.data);
            const data = JSON.parse(msg.data);

            if (data.type === "answer") {
                await pc.setRemoteDescription({
                    type: "answer",
                    sdp: data.sdp
                });
                console.log("ANSWER APLICADA");
            }
        };
    </script>
</body>
</html>
