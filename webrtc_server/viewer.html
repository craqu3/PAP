<!DOCTYPE html>
<html>
<body>
    <h2>Viewer</h2>
    <video id="remote" autoplay playsinline muted style="width:300px; background:black"></video>

    <script>
        const ws = new WebSocket("ws://127.0.0.1:9000");
        const pc = new RTCPeerConnection();

        pc.ontrack = (event) => {
            console.log("VIEWER: track recebida");
            document.getElementById("remote").srcObject = event.streams[0];
        };

        pc.addTransceiver("video", { direction: "recvonly" });

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                ws.send(JSON.stringify({
                    role: "viewer",
                    type: "candidate",
                    candidate: event.candidate
                }));
            }
        };

        ws.onopen = async () => {
            console.log("WS VIEWER ABRIU");

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            ws.send(JSON.stringify({
                role: "viewer",
                type: "offer",
                sdp: offer.sdp
            }));
        };

        ws.onmessage = async (msg) => {
            console.log("VIEWER ← MSG:", msg.data);
            const data = JSON.parse(msg.data);

            if (data.type === "answer") {
                await pc.setRemoteDescription({
                    type: "answer",
                    sdp: data.sdp
                });
                console.log("VIEWER: ANSWER aplicada");
            }
        };
    </script>
</body>
</html>
